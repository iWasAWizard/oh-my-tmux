# Mouse Control
set -g mouse on

# Reduce key-sequence lag (important for Vim/Neovim and Alt-key bindings)
set -sg escape-time 0

# Larger scrollback history
set -g history-limit 50000

# Enable focus events (lets Vim/Neovim react to terminal focus changes)
set -g focus-events on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Better system clipboard integration
set -g set-clipboard on

# Vi keys in copy/scroll mode
setw -g mode-keys vi

# Split pane shortcuts (stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move through panes with Alt+Arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Alt+Shift+Arrow
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
